backend:
  name: git-gateway
  branch: main

# Enable local development with: npx decap-server
local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:

  # ── PRODUCTS ──────────────────────────────────────────────
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name",  name: "title",    widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Resin Blocks",    value: "blocks" }
          - { label: "Specialty Items", value: "specialty" }
          - { label: "Pressed Frames",  value: "pressed" }
          - { label: "Letters",         value: "letters" }
          - { label: "Add-Ons",         value: "addons" }
          - { label: "Custom",          value: "custom" }
      - { label: "Price ($)",     name: "price",    widget: "number", value_type: "int" }
      - { label: "Description",   name: "description", widget: "text" }
      - { label: "Badge",         name: "badge",    widget: "string", required: false, hint: "e.g. Bestseller, New, Free w/ order" }
      - { label: "Product Photo", name: "image",    widget: "image",  required: false }
      - { label: "In Stock",      name: "inStock",  widget: "boolean", default: true }
      - { label: "Sort Order",    name: "order",    widget: "number", value_type: "int", default: 99 }

  # ── GALLERY ───────────────────────────────────────────────
  - name: "gallery"
    label: "Gallery"
    label_singular: "Gallery Photo"
    folder: "src/content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Caption",    name: "title",   widget: "string" }
      - { label: "Photo",      name: "image",   widget: "image" }
      - { label: "Featured (shows large)", name: "featured", widget: "boolean", default: false }
      - { label: "Sort Order", name: "order",   widget: "number", value_type: "int", default: 99 }

  # ── TESTIMONIALS ──────────────────────────────────────────
  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client Name", name: "author", widget: "string" }
      - { label: "Quote",       name: "quote",  widget: "text" }
      - { label: "Sort Order",  name: "order",  widget: "number", value_type: "int", default: 99 }

  # ── FAQ ───────────────────────────────────────────────────
  - name: "faq"
    label: "FAQ"
    label_singular: "FAQ Item"
    folder: "src/content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Answer",   name: "answer",   widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Flowers",    value: "flowers" }
          - { label: "Shipping",   value: "shipping" }
          - { label: "Process",    value: "process" }
          - { label: "After Care", value: "care" }
      - { label: "Sort Order", name: "order", widget: "number", value_type: "int", default: 99 }

  # ── SITE SETTINGS ─────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "src/content/settings/general.json"
        fields:
          - { label: "Site Title",       name: "siteTitle",    widget: "string" }
          - { label: "Tagline",          name: "tagline",      widget: "string" }
          - { label: "Email",            name: "email",        widget: "string" }
          - { label: "Phone",            name: "phone",        widget: "string" }
          - { label: "Instagram Handle", name: "instagram",    widget: "string" }
          - { label: "Facebook Handle",  name: "facebook",     widget: "string" }
          - { label: "TikTok Handle",    name: "tiktok",       widget: "string" }
          - { label: "Formspree ID",     name: "formspreeId",  widget: "string" }
          - { label: "Hero Headline",    name: "heroHeadline", widget: "string" }
          - { label: "Hero Subtext",     name: "heroSubtext",  widget: "text" }
          - { label: "Hero Image",       name: "heroImage",    widget: "image", required: false }
